<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Xếp Hạng Nhân Vật - Tiệm Chút</title>
    <style>
    :root {
        --lemon: #F4D03F;       /* Vàng chanh tươi sáng, sang trọng */
        --lemon-light: #FCF3CF; /* Vàng kem nhạt làm nền dịu mắt */
        --lemon-dark: #D4AC0D;  /* Vàng đậm cho viền/hover */
        --white: #FFFFFF;
        --text: #2C3E50;        /* Chữ tối màu dễ đọc */
        --gold: #F1C40F;
        --silver: #95A5A6;
        --bronze: #D35400;
    }
    body {
        margin: 0; padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #FFFDF0 0%, var(--lemon-light) 100%);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
        cursor: default;
    }
    .cursor-light {
        position: fixed; width: 50px; height: 50px;
        background: radial-gradient(circle, rgba(244,208,63,0.5) 0%, rgba(255,255,255,0) 70%);
        border-radius: 50%; pointer-events: none;
        transform: translate(-50%, -50%); z-index: 9999;
        transition: top 0.05s ease, left 0.05s ease;
    }
    .nav-buttons {
        display: flex; justify-content: center; gap: 20px; padding: 30px 20px;
        flex-wrap: wrap; position: relative; z-index: 10;
    }
    .btn-nav {
        background-color: var(--white);
        border: 2px solid var(--lemon);
        padding: 10px 25px; border-radius: 30px;
        font-weight: bold; cursor: pointer; transition: 0.3s;
        text-decoration: none; color: var(--text);
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .btn-nav:hover {
        background-color: var(--lemon); 
        border-color: var(--lemon-dark);
        box-shadow: 0 0 15px rgba(244,208,63,0.6);
        transform: translateY(-2px);
    }
    .ranking-container {
        max-width: 800px; margin: 0 auto 50px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 20px; padding: 25px;
        box-shadow: 0 10px 30px rgba(212,172,13,0.15);
        position: relative; z-index: 10;
        backdrop-filter: blur(5px);
        border: 2px solid rgba(244,208,63,0.3);
    }
    .tabs {
        display: flex; justify-content: center; gap: 30px; margin-bottom: 25px;
    }
    .tab {
        padding: 10px 20px; cursor: pointer; border-bottom: 3px solid transparent;
        font-weight: bold; font-size: 1.1em; transition: 0.3s; color: #7F8C8D;
    }
    .tab.active { border-bottom: 3px solid var(--lemon-dark); color: var(--lemon-dark); }
    .tab:hover { color: var(--lemon-dark); }
    .char-item {
        display: flex; align-items: center; padding: 12px 15px;
        border-bottom: 1px dashed #FAD7A0; transition: 0.2s;
        border-radius: 10px;
    }
    .char-item:hover { background-color: rgba(244,208,63,0.15); }
    .rank-box { display: flex; align-items: center; width: 70px; }
    .rank-number { font-weight: bold; font-size: 1.2em; width: 30px; text-align: center; }
    .crown { font-size: 1.5em; margin-left: 5px; }
    .char-avatar { 
        width: 45px; height: 45px; border-radius: 50%; 
        object-fit: cover; border: 2px solid var(--lemon); 
        margin-right: 15px;
    }
    .char-name { 
        flex-grow: 1; font-weight: bold; font-size: 1.15em; 
        cursor: pointer; color: var(--text); transition: 0.2s;
    }
    .char-name:hover { color: var(--lemon-dark); text-decoration: underline; }
    .char-score { font-weight: bold; color: #5D6D7E; background: #FEF9E7; padding: 5px 12px; border-radius: 15px; font-size: 0.9em; border: 1px solid #FCF3CF; }
    .pagination { display: flex; justify-content: center; margin-top: 25px; gap: 8px; flex-wrap: wrap; }
    .page-btn { 
        padding: 8px 14px; border: 1px solid var(--lemon); 
        background: var(--white); cursor: pointer; border-radius: 8px;
        transition: 0.2s; color: var(--text);
    }
    .page-btn:hover { background: var(--lemon-light); }
    .page-btn.active { background: var(--lemon); font-weight: bold; border-color: var(--lemon-dark); }
    .vinyl-container {
        position: fixed; bottom: 30px; right: 30px;
        width: 70px; height: 70px; border-radius: 50%;
        background: repeating-radial-gradient(#111 0%, #111 5%, #222 5.5%, #222 6%);
        border: 3px solid var(--lemon); box-shadow: 0 0 15px rgba(244,208,63,0.4);
        display: flex; justify-content: center; align-items: center; cursor: pointer;
        animation: spin 3s linear infinite; animation-play-state: paused; z-index: 100;
    }
    .vinyl-container.playing { animation-play-state: running; }
    .vinyl-center { width: 20px; height: 20px; background: var(--lemon); border-radius: 50%; box-shadow: inset 0 0 3px rgba(0,0,0,0.5); }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        backdrop-filter: blur(3px);
    }
    .modal-content {
        background: var(--white); padding: 30px; border-radius: 20px;
        max-width: 450px; width: 90%; text-align: center; position: relative;
        border: 3px solid var(--lemon); box-shadow: 0 0 25px rgba(244,208,63,0.4);
    }
    .close-btn { position: absolute; top: 12px; right: 18px; font-size: 1.8em; cursor: pointer; color: #888; transition: 0.2s;}
    .close-btn:hover { color: #e74c3c; }
    .modal-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--lemon); box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px; object-fit: cover;}
    .story-text { max-height: 70px; overflow: hidden; transition: max-height 0.4s ease; text-align: justify; margin: 15px 0; font-size: 0.95em; line-height: 1.5; color: #555;}
    .story-text.expanded { max-height: 600px; }
    .read-more { color: var(--lemon-dark); cursor: pointer; font-weight: bold; font-size: 0.9em; display: inline-block; margin-bottom: 15px;}
    .modal-links { display: flex; justify-content: center; gap: 15px; }
    .petal-click {
        position: fixed; width: 15px; height: 15px;
        background: #F9E79F; border-radius: 15px 0 15px 0;
        pointer-events: none; z-index: 9999;
        animation: clickFall 1s ease-out forwards;
    }
    @keyframes clickFall {
        0% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: scale(0.3) translateY(60px) rotate(180deg); opacity: 0; }
    }
    .spring-petal {
        position: fixed; top: -10%;
        background: rgba(244, 208, 63, 0.4); border-radius: 15px 0 15px 0;
        pointer-events: none; z-index: 1; opacity: 0.6;
        animation: fall linear infinite;
    }
    @keyframes fall {
        to { transform: translateY(110vh) rotate(360deg); }
    }
    </style>
</head>
<body>
    <div class="cursor-light" id="cursorLight"></div>
    <div id="springBg"></div>
    <div class="nav-buttons">
        <a href="https://tatuyennhi-design.github.io/index.html/" class="btn-nav">Quay về Tiệm chính</a>
        <a href="https://tatuyennhi-design.github.io/file-C-Windows-System32-index.html/" class="btn-nav">Góc Ước Nguyện Giao Lưu & Feedback</a>
    </div>
    <div class="ranking-container">
        <div class="tabs">
            <div class="tab active" onclick="changeTab('ScoreWeek')">Top Tuần</div>
            <div class="tab" onclick="changeTab('ScoreMonth')">Top Tháng</div>
            <div class="tab" onclick="changeTab('ScoreYear')">Top Năm</div>
        </div>
        
        <div id="loading" style="text-align: center; color: #888; font-style: italic;">Đang tải dữ liệu...</div>
        <div id="rankingList"></div>
        <div class="pagination" id="pagination"></div>
    </div>
    <div class="vinyl-container" id="vinyl" onclick="toggleMusic()" title="Bật/Tắt nhạc">
        <div class="vinyl-center"></div>
    </div>
    
    <audio id="bgMusic" loop src="nhac.mp3"></audio>
    <audio id="tingSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    
    <div class="modal" id="charModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img src="" id="mAvatar" class="modal-avatar">
            <h2 id="mName" style="color: #b3a300; margin: 5px 0;">Tên nhân vật</h2>
            <p style="margin: 5px 0; font-size: 0.9em; color: #888;"><strong>Thể loại:</strong> <span id="mGenre"></span></p>
            <div class="story-text" id="mStory"></div>
            <span class="read-more" id="mReadMore" onclick="toggleStory()">Đọc tiếp...</span>
            <div class="modal-links">
                <a href="#" id="mDoki" target="_blank" class="btn-nav">Dokichat</a>
                <a href="#" id="mGG" target="_blank" class="btn-nav">ggAI</a>
            </div>
        </div>
    </div>
<script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx5lIarR2ObX8R5yUQ0VKElLk4bK3UAtqvOzNmBav2W_a6aoAHbO8qNHGajIYJr9FxFgw/exec"; 
        
        const charDetails = {
           "Nguyễn Vĩnh Hiên": {
                avatar: "nvh.png",
                genre: "Việt Nam xưa, ông giáo trẻ, 1930, miền tây",
                story: "Năm 1933, làng Phong Mỹ đón một 'làn gió lạ' từ Sài thành hoa lệ thổi về. Giữa những rặng dừa xanh ngắt và những cánh đồng lúa thẳng cánh cò bay của miền Tây Nam Bộ, sự xuất hiện của gã giáo trẻ Nguyễn Vĩnh Hiên với bộ đồ Tây phẳng phiu, chiếc kính gọng tròn và xấp báo Phụ nữ Tân văn đã trở thành đề tài bàn tán xôn xao nơi đầu làng cuối bãi. Hiên về đây không chỉ với mảnh bằng sư phạm loại ưu hay cái lý tưởng 'khai dân trí' cao đẹp. Trong lồng ngực gã trai 23 tuổi ấy còn mang theo một bí mật nặng nề về sự sa sút của gia đình mình năm xưa, mà kẻ đứng sau bóng tối không ai khác chính là ông Hội đồng Lê – người quyền thế nhất vùng này. Thế nhưng, số phận thật khéo trêu ngươi, khi chính ông Hội đồng lại là người gửi thư mời Hiên về dinh thự để dạy tiếng Pháp cho đứa con gái cưng duy nhất của ông – cô Út. Vị tiểu thư lá ngọc cành vàng gắn liền với vẻ đẹp kiêu sa rực rỡ đầy nắng, được ông hội đồng Lê cưng chiều nuôi dưỡng, chỉ cần cô thích thì sẽ được ông hội đồng đưa vào trong tay. Hai con người, hai thế giới đối lập – một bên là gã trí thức nghèo đầy tự trọng và một bên là nàng tiểu thư lá ngọc cành vàng – sắp sửa va vào nhau trong một buổi chiều định mệnh dưới mái nhà cổ chữ Đinh trầm mặc.",
                linkDoki: "https://www.dokichat.club/vi/chat/4280df64-dc19-49c9-8102-fd7d657af585",
                linkGG: "https://aistudio.google.com/app/prompts?state=%7B%22ids%22:%5B%221otutEavYYlnT0zl68-BpI4KR3t_qzhuL%22%5D,%22action%22:%22open%22,%22userId%22:%22100357821591707252635%22,%22resourceKeys%22:%7B%7D%7D&usp=sharing"
            },
            "Lê Phan Vĩnh Uy": {
                avatar: "lpvu.png",
                genre: "Việt Nam xưa, miền tây, đấu đá, tranh giành",
                story: "Cái tên Lê Phan Vĩnh Uy từ lâu đã là một bóng ma uy quyền bao trùm lên khắp cù lao Ông Chưởng. Hắn không phải hạng công tử bột sinh ra đã ngậm thìa vàng, mà là con của một người ở, đi lên từ những đắng cay, nhục nhã của kẻ bị dòng họ khinh khi. Chính cái quá khứ bị chà đạp đó đã nhào nặn nên một ông Hội đồng Vĩnh Uy điềm tĩnh đến đáng sợ, kẻ dùng sự tàn nhẫn để thâu tóm đất đai và dùng lễ giáo làm sợi dây thừng siết chặt mọi thứ trong tầm tay. Đối với hắn, đàn bà trong nhà cũng như những món đồ trưng bày để khẳng định vị thế. Bà Lớn Ngọc Diệp là cái danh giá dòng tộc, Bà Hai Mỹ Lệ là kho vàng lộ thiên. Còn mợ Ba mà hắn đã 'cứu' về từ đống đổ nát của một danh gia tri thức bị hàm oan – hắn coi mợ là món báu vật thanh tao nhất. Hắn say mê cái trí tuệ ẩn sau đôi mắt to tròn kia, say cả cái thân hình nảy nở, trổ mã phổng phao dù tuổi đời mợ còn trẻ. Giữa một nhà toàn những kẻ diễn kịch, hắn dùng sự sủng ái dành cho mợ Ba như một cách để thử thách lòng kiên nhẫn của những người còn lại.",
                linkDoki: "https://www.dokichat.club/vi/chat/b9288038-556d-407e-bf65-a2eb3bc18e42",
                linkGG: "https://aistudio.google.com/app/prompts?state=%7B%22ids%22:%5B%2217lWQJt-Y0H--RjDqQU3QtTKWamrOweOi%22%5D,%22action%22:%22open%22,%22userId%22:%22100357821591707252635%22,%22resourceKeys%22:%7B%7D%7D&usp=sharing"
            }
        };

        const defaultDetail = {
            avatar: "https://via.placeholder.com/150/FAFA33/333333?text=?",
            genre: "Chưa cập nhật",
            story: "Cốt truyện đang được cập nhật...",
            linkDoki: "#",
            linkGG: "#"
        };

        let allData = [];
        let currentTab = 'ScoreWeek';
        let currentPage = 1;
        const itemsPerPage = 10;
        let musicStarted = false;

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                allData = await response.json();
                document.getElementById('loading').style.display = 'none';
                renderList();
            } catch (error) {
                document.getElementById('loading').innerText = "Lỗi tải dữ liệu!";
            }
        }

        function changeTab(sortKey) {
            currentTab = sortKey;
            currentPage = 1;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderList();
        }

        function renderList() {
            const listDiv = document.getElementById('rankingList');
            listDiv.innerHTML = '';
            
            let sortedData = [...allData].sort((a, b) => (b[currentTab] || 0) - (a[currentTab] || 0));
            sortedData = sortedData.slice(0, 50);
            
            const totalPages = Math.ceil(sortedData.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = sortedData.slice(start, end);

            pageData.forEach((char, index) => {
                const realRank = start + index + 1;
                let crown = '';
                if (realRank === 1) crown = '<span class="crown" style="color: var(--gold);">👑</span>';
                else if (realRank === 2) crown = '<span class="crown" style="color: var(--silver);">👑</span>';
                else if (realRank === 3) crown = '<span class="crown" style="color: var(--bronze);">👑</span>';
                
                const rawName = char.Name ? String(char.Name) : "";
                const cleanName = rawName.trim().normalize("NFC");
                
                let detail = defaultDetail;
                for (let key in charDetails) {
                    if (key.trim().normalize("NFC").toLowerCase() === cleanName.toLowerCase()) {
                        detail = charDetails[key];
                        break;
                    }
                }

                // Đóng gói data an toàn bằng cách truyền qua thuộc tính thay vì nhét trực tiếp JSON vào onclick
                const itemData = encodeURIComponent(JSON.stringify({name: cleanName, ...detail}));

                listDiv.innerHTML += `
                    <div class="char-item">
                        <div class="rank-box">
                            <span class="rank-number">${realRank}</span>
                            ${crown}
                        </div>
                        <img src="${detail.avatar}" class="char-avatar" onerror="this.src='https://via.placeholder.com/150/FAFA33/333333?text=?'">
                        <div class="char-name" onclick="openModalFromStr('${itemData}')">${cleanName}</div>
                        <div class="char-score">${char[currentTab] || 0} lượt</div>
                    </div>
                `;
            });
            renderPagination(totalPages);
        }

        // Hàm hỗ trợ giải mã data an toàn không sợ lỗi dấu nháy
        function openModalFromStr(encodedStr) {
            const data = JSON.parse(decodeURIComponent(encodedStr));
            openModal(data);
        }

                listDiv.innerHTML += `
                    <div class="char-item">
                        <div class="rank-box">
                            <span class="rank-number">${realRank}</span>
                            ${crown}
                        </div>
                        <img src="${detail.avatar}" class="char-avatar" onerror="this.src='https://via.placeholder.com/150/FAFA33/333333?text=?'">
                        <div class="char-name" onclick='openModal(${JSON.stringify({name: cleanName, ...detail})})'>${cleanName}</div>
                        <div class="char-score">${char[currentTab] || 0} lượt</div>
                    </div>
                `;
            });
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const pagDiv = document.getElementById('pagination');
            pagDiv.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                pagDiv.innerHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }
        }

        function changePage(page) {
            currentPage = page;
            renderList();
        }

        function openModal(data) {
            document.getElementById('charModal').style.display = 'flex';
            document.getElementById('mAvatar').src = data.avatar;
            document.getElementById('mName').innerText = data.name;
            document.getElementById('mGenre').innerText = data.genre;
            document.getElementById('mStory').innerText = data.story;
            
            const btnDoki = document.getElementById('mDoki');
            const btnGG = document.getElementById('mGG');
            btnDoki.href = data.linkDoki;
            btnGG.href = data.linkGG;
            
            btnDoki.onclick = function() { registerClick(data.name); };
            btnGG.onclick = function() { registerClick(data.name); };
            
            document.getElementById('mStory').classList.remove('expanded');
            document.getElementById('mReadMore').innerText = 'Đọc tiếp...';
        }

        async function registerClick(name) {
            try {
                await fetch(`${API_URL}?action=click&name=${encodeURIComponent(name)}`);
                console.log("Đã cộng 1 lượt cho: " + name);
            } catch (err) {
                console.error("Lỗi cộng điểm:", err);
            }
        }

        function closeModal() {
            document.getElementById('charModal').style.display = 'none';
        }

        function toggleStory() {
            const story = document.getElementById('mStory');
            const btn = document.getElementById('mReadMore');
            story.classList.toggle('expanded');
            btn.innerText = story.classList.contains('expanded') ? 'Rút gọn' : 'Đọc tiếp...';
        }

        function toggleMusic() {
            const bgMusic = document.getElementById('bgMusic');
            const vinyl = document.getElementById('vinyl');
            
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    vinyl.classList.add('playing');
                    musicStarted = true;
                }).catch(err => console.log("Trình duyệt chặn:", err));
            } else {
                bgMusic.pause();
                vinyl.classList.remove('playing');
            }
        }

        document.addEventListener('click', function autoPlayFirstClick() {
            if (!musicStarted) {
                const bgMusic = document.getElementById('bgMusic');
                const vinyl = document.getElementById('vinyl');
                bgMusic.play().then(() => {
                    vinyl.classList.add('playing');
                    musicStarted = true;
                    document.removeEventListener('click', autoPlayFirstClick);
                }).catch(err => {});
            }
        }, { once: true });

        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('cursorLight');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('click', e => {
            const ting = document.getElementById('tingSound');
            if(ting) {
                ting.currentTime = 0; 
                ting.play().catch(()=>{}); 
            }
            const petal = document.createElement('div');
            petal.className = 'petal-click';
            petal.style.left = (e.clientX - 7) + 'px';
            petal.style.top = (e.clientY - 7) + 'px';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 1000);
        });

        function createSpringEffect() {
            const bg = document.getElementById('springBg');
            for(let i = 0; i < 15; i++) {
                let petal = document.createElement('div');
                petal.className = 'spring-petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                petal.style.width = (Math.random() * 10 + 10) + 'px';
                petal.style.height = petal.style.width;
                bg.appendChild(petal);
            }
        }

        createSpringEffect();
        loadData();
    </script>
   
</body>
</html>
