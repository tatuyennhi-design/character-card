<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Xếp Hạng - Tiệm Nhà Hy</title>
    <style>
        /* ==================== MÀU SẮC & CƠ BẢN ==================== */
        :root {
            --lemon: #fff8cc;
            --lemon-dark: #fada5e;
            --white: #ffffff;
            --text-main: #5c5016;
            --text-light: #8a7b32;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--lemon);
            color: var(--text-main);
            overflow-x: hidden;
            cursor: default;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        /* ==================== THANH ĐIỀU HƯỚNG (NAVBAR) ==================== */
        .top-nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 15px;
            z-index: 1001;
            box-shadow: 0 4px 15px rgba(250, 218, 94, 0.3);
            backdrop-filter: blur(8px);
            border-bottom: 2px dashed var(--lemon-dark);
        }

        .nav-btn {
            text-decoration: none;
            color: var(--text-main);
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid var(--lemon-dark);
            background: var(--lemon);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--lemon-dark);
            color: var(--white);
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 4px 10px rgba(250, 218, 94, 0.4);
        }

        /* ==================== BANNER & SLOGAN ==================== */
        .banner-container {
            width: 100%;
            height: 250px;
            background-image: url('https://via.placeholder.com/1200x400/fada5e/ffffff?text=Thay+ảnh+Banner+vào+đây');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 5px solid var(--white);
        }

        .slogan {
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            color: var(--lemon-dark);
            text-shadow: 1px 1px 0px #fff;
            border: 2px dashed var(--lemon-dark);
        }

        /* ==================== ĐĨA NHẠC ==================== */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            background: var(--white);
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            border: 2px solid var(--lemon-dark);
        }
        
        .record {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #333;
            border: 4px solid #111;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 3s linear infinite;
            animation-play-state: paused;
            cursor: pointer;
        }

        .record.playing { animation-play-state: running; }
        .record::after {
            content: '';
            width: 15px; height: 15px;
            background: var(--lemon-dark);
            border-radius: 50%;
        }
        .music-info { margin-left: 10px; font-size: 14px; font-weight: bold; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ==================== TABS ==================== */
        .main-content { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn {
            background: var(--white);
            border: 2px solid var(--lemon-dark);
            color: var(--text-main);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 var(--lemon-dark);
        }
        .tab-btn.active, .tab-btn:hover {
            background: var(--lemon-dark);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: 4px 4px 0 #d8bb46;
        }

        /* ==================== BẢNG XẾP HẠNG ==================== */
        .ranking-list {
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(250, 218, 94, 0.2);
            border: 1px solid #fde78a;
        }
        .rank-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px dashed #fde78a;
            cursor: pointer;
        }
        .rank-item:hover { background: #fffcf0; border-radius: 10px; }
        .rank-item:last-child { border-bottom: none; }
        .rank-number { font-size: 24px; font-weight: 900; color: #d1c175; width: 50px; text-align: center; }
        
        .top-1 .rank-number { color: #FFD700; font-size: 30px; }
        .top-2 .rank-number { color: #C0C0C0; font-size: 28px; }
        .top-3 .rank-number { color: #CD7F32; font-size: 26px; }

        .crown { font-size: 24px; margin-right: 10px; }
        .char-info { flex-grow: 1; margin-left: 15px; }
        .char-name { font-size: 18px; font-weight: bold; }
        .char-clicks { font-size: 14px; color: var(--text-light); }

        .action-panel { display: none; gap: 10px; margin-top: 10px; }
        .rank-item.open .action-panel { display: flex; }

        .chat-btn {
            background: var(--lemon-dark);
            color: var(--white);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
        }
        .chat-btn:hover { background: #e3c544; }

        /* ==================== FOOTER & HIỆU ỨNG ==================== */
        footer {
            text-align: center; padding: 30px; margin-top: 50px;
            background: var(--white); color: var(--text-light);
            font-weight: bold; border-top: 2px dashed var(--lemon-dark);
        }

        .cursor-star {
            position: absolute; pointer-events: none; width: 10px; height: 10px;
            background: var(--lemon-dark);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: fadeStar 0.8s ease-out forwards; z-index: 9999;
        }
        .blossom {
            position: absolute; pointer-events: none; font-size: 20px;
            animation: fallBlossom 1s ease-out forwards; z-index: 9999;
        }

        @keyframes fadeStar { 0% { transform: scale(1) rotate(0deg); opacity: 1; } 100% { transform: scale(0) rotate(90deg); opacity: 0; } }
        @keyframes fallBlossom { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(50px) rotate(180deg); opacity: 0; } }
    </style>
</head>
<body>

    <script>
        function playTing() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } catch (e) {}
        }
    </script>

    <!-- THANH MENU LIÊN KẾT 3 WEB -->
    <nav class="top-nav">
        <a href="https://tatuyennhi-design.github.io/index.html/" class="nav-btn">🏠 Quán Ăn (Trang chủ)</a>
        <a href="#" class="nav-btn active">🏆 Bảng Xếp Hạng</a>
        <a href="https://tatuyennhi-design.github.io/file-C-Windows-System32-index.html/" class="nav-btn">✨ Ước Nguyện & Feedback</a>
    </nav>

    <!-- BANNER -->
    <div class="banner-container">
        <div class="slogan">✨ Bảng Phong Thần - Tiệm Nhà Hy ✨</div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="tabs">
            <button class="tab-btn active" onclick="changeTab(this)">Top Tuần</button>
            <button class="tab-btn" onclick="changeTab(this)">Top Tháng</button>
            <button class="tab-btn" onclick="changeTab(this)">Top Năm</button>
        </div>
        <div class="ranking-list" id="ranking-list">
            <h3 style="text-align: center; color: var(--text-light);">Đang tải dữ liệu lấp lánh...</h3>
        </div>
    </div>

    <!-- ĐĨA NHẠC CHILL -->
    <div class="music-player" onclick="toggleMusic()">
        <div class="record" id="record"></div>
        <div class="music-info" id="music-text">Bật nhạc lên chill 🎵</div>
        <audio id="bg-audio" loop src="https://actions.google.com/sounds/v1/water/waves_crashing_on_rock_beach.ogg"></audio>
    </div>

    <!-- FOOTER -->
    <footer>
        🍋 Tiệm nhà Hy - Dép Dày Thụy Tiên 🍋 <br> Nơi các "cục cưng" được vinh danh
    </footer>

    <!-- CODE XỬ LÝ -->
    <script>
        const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbzyDQva5ToRsZGY5aBU_YwhjPinFBbai8usf1ZRcNjPDo8qqo5qL1zxRxwe4sryOX2Xrw/exec"; 
        
        const charLinks = {
            "Hắc Vô Kỵ": { doki: "https://www.dokichat.club/vi/chat/79f2b68d-ea14-417a-a2fd-66f283d3ac95", ggai: "https://aistudio.google.com/app/prompts?state=%7B%22ids%22:%5B%221TfcTSRljA3kQO8PDUcpbE623h6j5mv1H%22%5D,%22action%22:%22open%22,%22userId%22:%22100357821591707252635%22,%22resourceKeys%22:%7B%7D%7D&usp=sharing" },
        };

        let lastMove = 0;
        document.addEventListener('mousemove', (e) => {
            const now = Date.now();
            if (now - lastMove > 50) { 
                const star = document.createElement('div');
                star.className = 'cursor-star';
                star.style.left = (e.pageX - 5) + 'px';
                star.style.top = (e.pageY - 5) + 'px';
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 800);
                lastMove = now;
            }
        });

        document.addEventListener('click', (e) => {
            // Không tạo hoa đào nếu click vào menu để chuyển trang (tránh giật)
            if(e.target.closest('.nav-btn')) return;

            playTing(); 
            const blossom = document.createElement('div');
            blossom.className = 'blossom';
            blossom.innerHTML = '🌸';
            blossom.style.left = (e.pageX - 10) + 'px';
            blossom.style.top = (e.pageY - 10) + 'px';
            document.body.appendChild(blossom);
            setTimeout(() => blossom.remove(), 1000);
        });

        const audio = document.getElementById('bg-audio');
        const record = document.getElementById('record');
        const musicText = document.getElementById('music-text');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                audio.pause(); record.classList.remove('playing'); musicText.innerText = "Bật nhạc lên chill 🎵";
            } else {
                audio.play(); record.classList.add('playing'); musicText.innerText = "Đang phát nhạc 🎶";
            }
            isPlaying = !isPlaying;
        }

        async function fetchRanking() {
            const listContainer = document.getElementById('ranking-list');
            if (GOOGLE_APP_URL === "YOUR_GOOGLE_SCRIPT_URL_HERE") {
                listContainer.innerHTML = '<h3 style="text-align:center; color:red;">Nhớ dán link Google Script vào code nha mày!</h3>';
                return;
            }
            try {
                const response = await fetch(`${GOOGLE_APP_URL}?action=getTop`);
                const data = await response.json();
                listContainer.innerHTML = ''; 

                if (data && data.length > 0) {
                    const top50 = data.slice(0, 50);
                    top50.forEach((char, index) => {
                        let rankClass = '', crownHtml = '', rankNum = index + 1;
                        if (index === 0) { rankClass = 'top-1'; crownHtml = '<span class="crown">👑</span>'; rankNum = '1'; }
                        else if (index === 1) { rankClass = 'top-2'; crownHtml = '<span class="crown">👑</span>'; rankNum = '2'; }
                        else if (index === 2) { rankClass = 'top-3'; crownHtml = '<span class="crown">👑</span>'; rankNum = '3'; }

                        const linkDoki = charLinks[char.name]?.doki || "#";
                        const linkGG = charLinks[char.name]?.ggai || "#";

                        const itemHtml = `
                            <div class="rank-item ${rankClass}" onclick="toggleLinks(this)">
                                ${crownHtml}
                                <div class="rank-number">${rankNum}</div>
                                <div class="char-info">
                                    <div class="char-name">${char.name}</div>
                                    <div class="char-clicks">🔥 ${char.clicks} lượt sủng ái</div>
                                    <div class="action-panel">
                                        <a href="${linkDoki}" target="_blank" class="chat-btn">Dokichat</a>
                                        <a href="${linkGG}" target="_blank" class="chat-btn">GGAI</a>
                                    </div>
                                </div>
                            </div>
                        `;
                        listContainer.innerHTML += itemHtml;
                    });
                } else { listContainer.innerHTML = '<h3 style="text-align:center;">Chưa có dữ liệu nào 😢</h3>'; }
            } catch (error) { listContainer.innerHTML = '<h3 style="text-align:center; color:red;">Lỗi kết nối. Thử lại sau!</h3>'; }
        }

        function toggleLinks(element) {
            document.querySelectorAll('.rank-item').forEach(el => { if (el !== element) el.classList.remove('open'); });
            element.classList.toggle('open');
        }

        function changeTab(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('ranking-list').innerHTML = '<h3 style="text-align: center; color: var(--text-light);">Đang lọc dữ liệu...</h3>';
            setTimeout(fetchRanking, 500);
        }

        window.onload = fetchRanking;
    </script>
</body>
</html>
